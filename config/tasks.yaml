tasks:
  clinical:
    description: |
      Review this evidence packet and produce the required JSON clinical research memo.
    expected_output: |
      A valid JSON object matching the requested clinical memo response format.
  evidence_reviewer:
    description: |
      Review this research result and judge the quality of its supplied evidence.
    expected_output: |
      A valid JSON object matching the requested evidence quality review response format.
  lifestyle:
    description: |
      Here is the raw patient form submission. Review lifestyle and psychological fields and make your triage decision.
    expected_output: |
      A valid JSON object matching the requested lifestyle triage response format.
  research:
    description: |
      Review this clinical/research packet and produce the required JSON research memo.
    expected_output: |
      A valid JSON object matching the requested research memo response format.
  report:
    description: |
      Create the final structured JSON report from this pipeline output.
    expected_output: |
      A valid JSON object matching the requested final report response format.
  report_chat:
    description: |
      Answer the doctor's question using only the supplied saved evidence bundle, saved doctor notes, and question_guideline_context for this one completed submission.
      Use the saved sequential-agent outputs, saved upload or OCR evidence, doctor-authored report notes, and retrieved guideline passages when relevant.
      Combine one, two, or several supplied evidence sources when needed.
      Do not use other patients, other reports, other retrieval, PubMed, medication lookup, websites, or outside clinical facts.
      If the supplied packet does not contain enough evidence, say so clearly.
    expected_output: |
      A valid JSON object with direct_answer, reasoning_summary, references, uncertainty, and limitations.
  report_patch:
    description: |
      Patch the supplied existing final report using the doctor's supplied missing information update.
      Preserve the report structure and unchanged supported content.
      Update only the sections that the new doctor-supplied information directly affects.
      Keep unresolved gaps inside missing_information.
    expected_output: |
      A valid JSON object matching the saved final report structure.
  arabic_pdf:
    description: |
      Translate this structured report into the requested Arabic JSON shape for the PDF only.
    expected_output: |
      A valid JSON object matching the requested Arabic PDF report response format.
